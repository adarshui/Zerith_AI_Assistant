<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerith AI — Personal Desktop Assistant</title>
    <meta name="description" content="Zerith AI personal desktop assistant with intelligent automation">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ── Sidebar ──────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Zerith AI</span>
            </div>
            <button class="btn-icon sidebar-toggle-btn" id="closeSidebar" title="Close sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
        </div>

        <button class="btn-new-chat" id="newChatBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New Chat
        </button>

        <div class="sidebar-section">
            <h3 class="sidebar-label">Status</h3>
            <div class="status-card" id="statusCard">
                <div class="status-row">
                    <span class="status-dot connected" id="statusDot"></span>
                    <span class="status-text" id="statusProvider">{{ provider }}</span>
                </div>
                <div class="status-model" id="statusModel">{{ model }}</div>
            </div>
        </div>

        <div class="sidebar-section">
            <h3 class="sidebar-label">Tools</h3>
            <div class="tool-list" id="toolList">
                <div class="tool-item loading">Loading tools...</div>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-footer-text">Zerith AI v1.0</div>
        </div>
    </aside>

    <!-- ── Main Content ─────────────────────────────── -->
    <main class="main" id="main">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="btn-icon" id="openSidebar" title="Open sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="topbar-info">
                <span class="topbar-provider" id="topbarProvider">{{ provider }}</span>
                <span class="topbar-sep">•</span>
                <span class="topbar-model" id="topbarModel">{{ model }}</span>
                <span class="topbar-sep">•</span>
                <span class="topbar-status" id="topbarStatus">Connecting...</span>
            </div>
            <div class="topbar-actions">
                <button class="btn-icon" id="clearBtn" title="Clear conversation">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <!-- Welcome screen -->
            <div class="welcome" id="welcome">
                <div class="welcome-icon">⚡</div>
                <h1 class="welcome-title">Zerith AI</h1>
                <p class="welcome-subtitle">Your personal desktop AI assistant</p>
                <div class="welcome-hints">
                    <button class="hint-card" data-message="List all files on my desktop">
                        <span class="hint-icon">📁</span>
                        <span class="hint-text">List files on desktop</span>
                    </button>
                    <button class="hint-card" data-message="What is my system information?">
                        <span class="hint-icon">💻</span>
                        <span class="hint-text">System information</span>
                    </button>
                    <button class="hint-card" data-message="Open notepad">
                        <span class="hint-icon">📝</span>
                        <span class="hint-text">Open Notepad</span>
                    </button>
                    <button class="hint-card" data-message="Find all Python files in this folder">
                        <span class="hint-icon">🔍</span>
                        <span class="hint-text">Find Python files</span>
                    </button>
                </div>
            </div>

            <!-- Messages container -->
            <div class="messages" id="messages"></div>

            <!-- Thinking indicator -->
            <div class="thinking-indicator" id="thinkingIndicator">
                <div class="thinking-dots">
                    <span></span><span></span><span></span>
                </div>
                <span class="thinking-text">Thinking...</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-toolbar">
                <button class="btn-toolbar" id="micBtn" title="Voice input (speech recognition)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button class="btn-toolbar" id="speakerBtn" title="Voice output (text-to-speech)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
                <button class="btn-toolbar" id="captureBtn" title="Capture screen">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </button>
                <label class="btn-toolbar" id="uploadBtn" title="Upload image">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </label>
            </div>
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="Ask Zerith anything..."
                    rows="1"
                    autofocus
                ></textarea>
                <button class="btn-send" id="sendBtn" title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
            <div class="input-footer">
                Zerith AI can make mistakes. Review tool actions before confirming.
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
